<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <title>NowzyPlay | Stream Unlimited</title>
</head>
<body>

    <div class="navbar">
        <div class="nav-left">
            <div class="logo"><img src="./Assets/logo.png" alt="Logo"></div>
            <span onclick="navigate('home')">Home</span>
            <span onclick="navigate('movies')">Movies</span>
            <span onclick="navigate('series')">Series</span>
            <span onclick="navigate('anime')">Anime</span>
            <span onclick="navigate('serials')">Serials</span>
        </div>
        <div class="nav-right">
            <input type="text" id="searchInput" placeholder="Search NowzyPlay...">
            <button class="login" id="loginBtn">Login</button>
            <div class="burger"><img src="./Assets/bars-solid-full.svg" alt="Menu"></div>
        </div>
    </div>

    <div id="loginModal" class="modal hidden">
        <div class="modal-box">
            <span id="closeModal">&times;</span>
            <h2>Login to NowzyPlay</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="loginUser()">Login</button>
        </div>
    </div>

    <section id="searchSection" class="trending" style="display:none;">
        <h2>Search Results</h2>
        <div class="movie-grid" id="searchGrid"></div>
    </section>

    <div class="hero" id="heroSection">
        <button class="prev">&#10094;</button>
        <div class="slider" id="slider"></div>
        <button class="next">&#10095;</button>
    </div>

    <section class="trending" id="trendingSection">
        <h2>Trending</h2>
        <div class="movie-grid" id="trendingGrid"></div>
    </section>

    <section class="trending" id="seriesSection">
        <h2>Series</h2>
        <div class="movie-grid" id="seriesGrid"></div>
    </section>

    <section class="trending" id="animeSection">
        <h2>Anime</h2>
        <div class="movie-grid" id="animeGrid"></div>
    </section>

    <section class="trending" id="serialSection">
        <h2>Serials</h2>
        <div class="movie-grid" id="serialGrid"></div>
    </section>

    <footer class="footer">
        <div class="footer-content">
            <h2 class="logo">NowzyPlay</h2>
            <p class="footer-desc">Watch unlimited movies, anime, series and shows anytime, anywhere.</p>
            <p class="copyright">© 2026 NowzyPlay. All rights reserved.</p>
        </div>
    </footer>

    <script type="module" src="./js/main.js"></script>
</body>
</html>
