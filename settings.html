<!DOCTYPE html>
<html>
<head>
    <title>Settings</title>

    <style>
        body {
            margin: 0;
            background: #0f0f1a;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: #1a1a2e;
            padding: 25px;
            border-radius: 10px;
            width: 350px;
        }

        h1 {
            color: #9d4edd;
        }

        button {
            margin-top: 10px;
            background: #7b2cbf;
            color: white;
            border: none;
            padding: 8px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #9d4edd;
        }

        /* ================= MOBILE ================= */

@media (max-width: 768px) {

    body {
        padding: 15px;
        height: auto;
    }

    .box {
        width: 100%;
        max-width: 350px;
        padding: 20px;
    }

    h1 {
        font-size: 22px;
        text-align: center;
    }

    p {
        font-size: 14px;
        text-align: center;
    }

    button {
        font-size: 14px;
        padding: 10px;
    }
}
    </style>
</head>

<body>

<div class="box">
    <h1>Settings</h1>

    <p>User: <span id="user"></span></p>

    <button onclick="logout()">Logout</button>
    <button onclick="goBack()">⬅ Back</button>
</div>

<script>
let user = localStorage.getItem("user");
document.getElementById("user").innerText = user || "Guest";

function logout() {
    localStorage.removeItem("user");
    alert("Logged out");
}

function goBack() {
    window.location.href = "index.html";
}
</script>

</body>
</html>
