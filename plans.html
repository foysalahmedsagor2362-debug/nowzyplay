<!DOCTYPE html>
<html>
<head>
    <title>Plans</title>

    <style>
        body {
            margin: 0;
            background: #0f0f1a;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: #1a1a2e;
            padding: 25px;
            border-radius: 10px;
            width: 350px;
        }

        h1 {
            color: #9d4edd;
        }

        .plan {
            margin: 10px 0;
            padding: 10px;
            background: #16213e;
            border-radius: 5px;
        }

        button {
            margin-top: 15px;
            background: #7b2cbf;
            color: white;
            border: none;
            padding: 8px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #9d4edd;
        }


        /* ================= MOBILE ================= */

@media (max-width: 768px) {

    body {
        padding: 15px;
        height: auto;
    }

    .box {
        width: 100%;
        max-width: 350px;
        padding: 20px;
    }

    h1 {
        font-size: 22px;
        text-align: center;
    }

    .plan {
        font-size: 14px;
        padding: 12px;
    }

    button {
        font-size: 14px;
        padding: 10px;
    }
}
    </style>
</head>

<body>

<div class="box">
    <h1>Plans</h1>

    <div class="plan"> Free - Basic streaming</div>
    <div class="plan"> Premium - HD + No Ads</div>
    <div class="plan"> VIP - Early access</div>

    <button onclick="goBack()">⬅ Back</button>
</div>

<script>
function goBack() {
    window.location.href = "index.html";
}
</script>

</body>
</html>
